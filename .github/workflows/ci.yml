name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      APP_ENV: testing
      APP_DEBUG: false
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: taggo_testing
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      SESSION_STORE: redis
      REDIS_CLIENT: predis
      REDIS_HOST: 127.0.0.1
    services:
      postgres:
        image: postgres:17
        env: { POSTGRES_DB: taggo_testing, POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres }
        ports: ['5432:5432']
        options: >- 
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with: { php-version: '8.3', extensions: pdo_pgsql, redis }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: composer install --no-interaction --prefer-dist --optimize-autoloader
      - run: npm ci
      - run: npm run build
      - run: cp .env.example .env
      - run: php artisan key:generate
      - run: php artisan optimize:clear
      - run: php artisan migrate:fresh --seed --env=testing --force
      - run: php artisan test
      - run: vendor/bin/pint --test
      - run: vendor/bin/phpstan analyse
